<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="TayVoice - Chuyển đổi văn bản thành giọng nói tự nhiên với hỗ trợ tiếng Việt chất lượng cao">
    <title>TayVoice - Python Server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-vietnamese.css">
</head>

<body>
    <!-- Background Gradient -->
    <div class="gradient-bg"></div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="12" fill="url(#logo-gradient)" />
                    <g transform="translate(8, 8)" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 10v3"/><path d="M6 6v11"/><path d="M10 3v18"/><path d="M14 8v7"/><path d="M18 5v13"/><path d="M22 10v3"/>
                    </g>
                    <defs>
                        <linearGradient id="logo-gradient" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#6366f1" />
                            <stop offset="100%" stop-color="#8b5cf6" />
                        </linearGradient>
                    </defs>
                </svg>
                <h1>TayVoice</h1>
            </div>
        </div>
    </header>



    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Text Input Section -->
            <section class="card input-section">
                <div class="card-header">
                    <h2>Nhập văn bản</h2>
                    <span class="char-counter">
                        <span id="charCount">0</span> ký tự
                    </span>
                </div>
                <textarea id="textInput" class="text-input"
                    placeholder="Nhập văn bản bạn muốn chuyển đổi thành giọng nói tiếng Việt..."
                    rows="6">Xin chào, đây là ứng dụng chuyển văn bản thành giọng nói tiếng Việt.</textarea>
                <div class="quick-actions">
                    <button class="btn-secondary" id="clearBtn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path
                                d="M2 4h12M5.5 4V3a1 1 0 011-1h3a1 1 0 011 1v1M13 4v9a2 2 0 01-2 2H5a2 2 0 01-2-2V4h10z" />
                        </svg>
                        Xóa
                    </button>
                    <button class="btn-secondary" id="pasteBtn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M10 2H6a1 1 0 00-1 1v1H3v10h10V4h-2V3a1 1 0 00-1-1zm0 1v1H6V3h4z" />
                        </svg>
                        Dán
                    </button>
                    <button class="btn-secondary" id="sampleBtn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M3 3h10v2H3V3zm0 4h10v2H3V7zm0 4h7v2H3v-2z" />
                        </svg>
                        Văn bản mẫu
                    </button>
                </div>
            </section>

            <!-- Controls Section -->
            <section class="card controls-section">
                <div class="controls-grid">
                    <!-- Voice Selection -->
                    <div class="control-group">
                        <label for="voiceSelect">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 3a2 2 0 00-2 2v6a2 2 0 104 0V5a2 2 0 00-2-2zM4 8v1a4 4 0 008 0V8" />
                            </svg>
                            Giọng đọc
                        </label>
                        <select id="voiceSelect" class="select">
                            <option value="vi">Đang tải giọng...</option>
                        </select>
                    </div>

                    <!-- Speed Control -->
                    <div class="control-group">
                        <label for="speedSlider">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 2a6 6 0 100 12A6 6 0 008 2zm1 8H7V6h2v4z" />
                            </svg>
                            Tốc độ: <span id="speedValue">1.0</span>x
                        </label>
                        <input type="range" id="speedSlider" class="slider" min="0.5" max="2" step="0.1" value="1">
                    </div>

                </div>
            </section>

            <!-- Action Buttons -->
            <section class="action-buttons">
                <button class="btn-primary" id="speakBtn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path
                            d="M6.3 3.7L12 8.5v3L6.3 16.3c-.4.4-1.1.1-1.1-.4V4.1c0-.5.7-.8 1.1-.4zM14 7v6a1 1 0 002 0V7a1 1 0 00-2 0z" />
                    </svg>
                    Phát giọng nói
                </button>
                <button class="btn-secondary" id="stopBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <rect x="5" y="5" width="10" height="10" rx="1" />
                    </svg>
                    Dừng
                </button>
                <button class="btn-secondary" id="downloadBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Tải xuống
                </button>
            </section>
            
            <div id="statusMessage" class="status-message" style="text-align: center; margin-top: 1rem; font-weight: 500; opacity: 0; transition: opacity 0.3s ease;"></div>

            <!-- History Section -->
            <section class="card history-section">
                <div class="card-header">
                    <h2>Lịch sử chuyển đổi</h2>
                    <button class="btn-text" id="clearHistoryBtn">
                        Xóa lịch sử
                    </button>
                </div>
                <div id="historyList" class="history-list">
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2" opacity="0.3" />
                            <path d="M24 12v12l8 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                opacity="0.3" />
                        </svg>
                        <p>Chưa có lịch sử chuyển đổi</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <svg width="24" height="24" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="12" fill="url(#logo-gradient)"/>
                        <g transform="translate(8, 8)" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 10v3"/><path d="M6 6v11"/><path d="M10 3v18"/><path d="M14 8v7"/><path d="M18 5v13"/><path d="M22 10v3"/>
                        </g>
                    </svg>
                    <span>TayVoice</span>
                </div>
                <div class="footer-team">
                    <span class="team-label">Thành viên nhóm</span>
                    <div class="team-members">
                        <span class="member-badge">Phạm Quang Nguyên</span>
                        <span class="member-badge">Đỗ Hoàng Huy</span>
                        <span class="member-badge">Nguyễn Mai Quỳnh</span>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 TayVoice. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Python Script -->
    <script src="script-python.js"></script>
</body>

</html>
